d with ONLY a valid JSON object, no markdown, no extra text.';\n    const prompt = 'Mark this IELTS Speaking test taken by a student (numbered answers below). Consider answer length versus time allowed: very short answers lower Fluency and Coherence.\\n\\n' + lines + '\\n\\nReturn ONLY this JSON shape:\\n{\"fluency\": 0.0, \"lexical\": 0.0, \"grammar\": 0.0, \"pronunciation\": 0.0, \"overall\": 0.0, \"comment\": \"2-3 encouraging but honest sentences addressed to the student summarising their performance\", \"corrections\": [{\"answer\": 1, \"quote\": \"short snippet copied EXACTLY word-for-word from that answer\\u2019s transcript\", \"type\": \"grammar\", \"fix\": \"the corrected version of the snippet\", \"note\": \"one short sentence explaining the problem\"}]}\\n\\nCorrection rules: \"answer\" is the answer number the snippet comes from; \"type\" must be one of \"grammar\", \"vocabulary\", \"pronunciation\", \"coherence\", \"fluency\"; pick the 6-14 most useful errors across all answers (fewer if the student made fewer); each quote must appear exactly in the transcript of that answer, keep quotes under 12 words, and never overlap two quotes from the same answer.';\n    try {\n      const text = await this.askClaude({\n        messages: [{ role: 'user', content: prompt }],\n        system: sys,\n        model: this.props.aiModel ?? 'claude-sonnet-4-5',\n        max_tokens: 1500\n      });\n      const m = text.match(/\\{[\\s\\S]*\\}/);\n      const j = JSON.parse(m[0]);\n      const b = x => Math.max(0, Math.min(9, Math.round((parseFloat(x) || 0) * 2) / 2));\n      const scores = { fluency: b(j.fluency), lexical: b(j.lexical), grammar: b(j.grammar), pronunciation: b(j.pronunciation) };\n      const avg = (scores.fluency + scores.lexical + scores.grammar + scores.pronunciation) / 4;\n      const overall = j.overall ? b(j.overall) : Math.round(avg * 2) / 2;\n      const corrections = (Array.isArray(j.corrections) ? j.corrections : []).filter(c => c && c.quote && c.type);\n      const report = {\n        scores, overall,\n        comment: String(j.comment || ''),\n        corrections,\n        annotated: this.annotate(corrections)\n      };\n      this.saveResultRecord(report);\n      this.setState({ marking: false, report });\n    } catch (e) {\n      this.setState({ marking: false, markErr: 'AI marking failed \\u2014 please check your internet connection and try again. Your recordings are safe in tab 1.' });\n    }\n  }\n\n  saveResultRecord(report) {\n    const S = this.state;\n    const rec = {\n      id: 'r' + Date.now(),\n      code: S.test.code, testNum: S.test.num,\n      name: S.name.trim(), klass: S.klass.trim(), num: S.num.trim(),\n      date: new Date().toLocaleDateString('en-GB'),\n      scores: report.scores, overall: report.overall,\n      comment: report.comment, corrections: report.corrections, annotated: report.annotated,\n      transcripts: this.responses.map(r => ({ label: r.label, question: r.question, transcript: r.transcript, dur: r.dur }))\n    };\n    this.saveResults([...S.results, rec]);\n  }\n\n  // ---------- export ----------\n  exportExcel(code) {\n    const rows = this.state.results.filter(r => r.code === code);\n    if (!rows.length) { this.setState({ exportMsg: 'No results to export yet for ' + code + '.' }); setTimeout(() => this.setState({ exportMsg: '' }), 3000); return; }\n    const header = ['Student Name', 'Class', 'Student Number', 'Test Number', 'Test Code', 'Date', 'Fluency & Coherence', 'Lexical Resource', 'Grammatical Range & Accuracy', 'Pronunciation', 'Overall Band', 'Examiner Comment', 'Corrections'];\n    const data = rows.map(r => [r.name, r.klass, r.num, 'T' + r.testNum, r.code, r.date, r.scores.fluency, r.scores.lexical, r.scores.grammar, r.scores.pronunciation, r.overall, r.comment, (r.corrections || []).map(c => '[' + c.type + '] ' + c.quote + ' \\u2192 ' + (c.fix || '')).join(' \\u2022 ')]);\n    if (window.XLSX) {\n      const ws = window.XLSX.utils.aoa_to_sheet([header, ...data]);\n      ws['!cols'] = [{ wch: 24 }, { wch: 10 }, { wch: 14 }, { wch: 11 }, { wch: 10 }, { wch: 12 }, { wch: 18 }, { wch: 16 }, { wch: 26 }, { wch: 14 }, { wch: 12 }, { wch: 60 }, { wch: 70 }];\n      const wb = window.XLSX.utils.book_new();\n      window.XLSX.utils.book_append_sheet(wb, ws, 'Results');\n      window.XLSX.writeFile(wb, 'Speaking_Feedback_' + code + '.xlsx');\n    } else {\n      const esc = v => '\"' + String(v).replace(/\"/g, '\"\"') + '\"';\n      const csv = [header, ...data].map(row => row.map(esc).join(',')).join('\\r\\n');\n      const url = URL.createObjectURL(new Blob(['\\ufeff' + csv], { type: 'text/csv' }));\n      const a = document.createElement('a');\n      a.href = url; a.download = 'Speaking_Feedback_' + code + '.csv'; a.click();\n      setTimeout(() => URL.revokeObjectURL(url), 5000);\n    }\n    this.setState({ exportMsg: 'Exported ' + rows.length + ' result(s) for ' + code + '.' });\n    setTimeout(() => this.setState({ exportMsg: '' }), 3000);\n  }\n\n  updEditor(field, idx, val) {\n    const ed = { ...this.state.editor };\n    if (idx === null) ed[field] = val;\n    else { ed[field] = [...ed[field]]; ed[field][idx] = val; }\n    this.setState({ editor: ed, infoErr: '' });\n  }\n\n  renderVals() {\n    const S = this.state;\n    const v = S.view;\n    const out = {\n      isLanding: v === 'landing', isTeacherLogin: v === 'teacherLogin', isTeacher: v === 'teacher',\n      isStudentInfo: v === 'studentInfo', isMicCheck: v === 'micCheck', isTest: v === 'test', isResults: v === 'results',\n      goHome: () => { this.killMedia(); if (this.timer) { clearInterval(this.timer); this.timer = null; } this.setState({ view: 'landing', running: false, codeInput: '', codeErr: '', pass: '', passErr: false }); },\n      goTeacher: () => this.setState({ view: 'teacherLogin', pass: '', passErr: false })\n    };\n\n    // landing\n    out.codeInput = S.codeInput;\n    out.onCode = e => this.setState({ codeInput: e.target.value.toUpperCase(), codeErr: '' });\n    out.codeErr = S.codeErr; out.hasCodeErr = !!S.codeErr;\n    out.studentContinue = () => {\n      const code = S.codeInput.trim().toUpperCase();\n      if (!code) { this.setState({ codeErr: 'Please enter your test code.' }); return; }\n      const test = S.tests.find(t => t.code === code);\n      if (!test) { this.setState({ codeErr: 'That code was not found. Please check with your teacher.' }); return; }\n      this.setState({ test, view: 'studentInfo', codeErr: '', infoErr: '' });\n    };\n\n    // teacher login\n    out.pass = S.pass;\n    out.onPass = e => this.setState({ pass: e.target.value, passErr: false });\n    out.passErr = S.passErr;\n    out.submitPass = () => {\n      if (S.pass === (this.props.teacherPasscode ?? '2468')) this.setState({ view: 'teacher', pass: '', passErr: false, editorOpen: false, selCode: null, selResultId: null });\n      else this.setState({ passErr: true });\n    };\n\n    // teacher dashboard\n    out.signOut = () => this.setState({ view: 'landing' });\n    out.editorOpen = S.editorOpen; out.notEditorOpen = !S.editorOpen;\n    out.newTest = () => this.setState({ editorOpen: true, editorErr: '', editor: { code: null, num: null, title: '', p1: ['', '', '', ''], p2topic: '', p2bullets: '', p3: ['', '', ''] } });\n    const ed = S.editor;\n    out.editorHeading = ed && ed.code ? 'Edit test \\u2014 ' + ed.code : 'Create a new test';\n    out.editorTitle = ed ? ed.title : '';\n    out.onEditorTitle = e => this.updEditor('title', null, e.target.value);\n    out.editorP1 = ed ? ed.p1.map((val, i) => ({ value: val, label: 'Question ' + (i + 1), onChange: e => this.updEditor('p1', i, e.target.value) })) : [];\n    out.editorP3 = ed ? ed.p3.map((val, i) => ({ value: val, label: 'Question ' + (i + 1), onChange: e => this.updEditor('p3', i, e.target.value) })) : [];\n    out.editorP2Topic = ed ? ed.p2topic : '';\n    out.onP2Topic = e => this.updEditor('p2topic', null, e.target.value);\n    out.editorP2Bullets = ed ? ed.p2bullets : '';\n    out.onP2Bullets = e => this.updEditor('p2bullets', null, e.target.value);\n    out.editorErr = S.editorErr || ''; out.hasEditorErr = !!S.editorErr;\n    out.saveEditor = () => {\n      const e2 = this.state.editor;\n      if (!e2.title.trim() || e2.p1.some(q => !q.trim()) || !e2.p2topic.trim() || e2.p3.some(q => !q.trim())) {\n        this.setState({ editorErr: 'Please fill in the title and every question before saving.' });\n        return;\n      }\n      const bullets = e2.p2bullets.split('\\n').map(s => s.trim()).filter(Boolean);\n      let tests;\n      if (e2.code) {\n        tests = this.state.tests.map(t => t.code === e2.code ? { ...t, title: e2.title.trim(), p1: e2.p1.map(s => s.trim()), p2topic: e2.p2topic.trim(), p2bullets: bullets, p3: e2.p3.map(s => s.trim()) } : t);\n      } else {\n        const num = this.state.tests.reduce((m, t) => Math.max(m, t.num || 0), 0) + 1;\n        tests = [...this.state.tests, { code: this.makeCode(), num, title: e2.title.trim(), p1: e2.p1.map(s => s.trim()), p2topic: e2.p2topic.trim(), p2bullets: bullets, p3: e2.p3.map(s => s.trim()), created: Date.now() }];\n      }\n      this.saveTests(tests);\n      this.setState({ editorOpen: false, editor: null, editorErr: '' });\n    };\n    out.cancelEditor = () => this.setState({ editorOpen: false, editor: null, editorErr: '' });\n\n    const resultsFor = code => S.results.filter(r => r.code === code);\n    out.testCards = S.tests.map(t => ({\n      code: t.code, title: t.title,\n      meta: 'Test ' + (t.num || '?') + ' \\u00b7 ' + resultsFor(t.code).length + ' submission' + (resultsFor(t.code).length === 1 ? '' : 's'),\n      onResults: () => this.setState({ selCode: this.state.selCode === t.code ? null : t.code, selResultId: null }),\n      onExport: () => this.exportExcel(t.code),\n      onEdit: () => this.setState({ editorOpen: true, editorErr: '', editor: { code: t.code, num: t.num, title: t.title, p1: [...t.p1], p2topic: t.p2topic, p2bullets: (t.p2bullets || []).join('\\n'), p3: [...t.p3] } }),\n      onDelete: () => { if (window.confirm('Delete test ' + t.code + '? Its results will be kept.')) this.saveTests(this.state.tests.filter(x => x.code !== t.code)); }\n    }));\n    out.exportMsg = S.exportMsg; out.hasExportMsg = !!S.exportMsg;\n    const selTest = S.tests.find(t => t.code === S.selCode);\n    out.hasSelected = !!selTest;\n    out.selTitle = selTest ? selTest.title : '';\n    out.selCode = S.selCode || '';\n    out.onExportSel = () => this.exportExcel(S.selCode);\n    const selRows = selTest ? resultsFor(selTest.code) : [];\n    out.hasRows = selRows.length > 0; out.noRows = selTest && selRows.length === 0;\n    out.resultRows = selRows.map(r => ({\n      name: r.name, klass: r.klass, num: r.num, date: r.date,\n      f: r.scores.fluency.toFixed(1), l: r.scores.lexical.toFixed(1), g: r.scores.grammar.toFixed(1), p: r.scores.pronunciation.toFixed(1), o: r.overall.toFixed(1),\n      onView: () => this.setState({ selResultId: this.state.selResultId === r.id ? null : r.id })\n    }));\n    const dr = S.results.find(r => r.id === S.selResultId);\n    out.hasSelResult = !!dr;\n    out.detailName = dr ? dr.name : '';\n    out.detailMeta = dr ? ('Class ' + dr.klass + ' \\u00b7 Student no. ' + dr.num + ' \\u00b7 ' + dr.date) : '';\n    out.detailScoreLine = dr ? ('Fluency & Coherence ' + dr.scores.fluency.toFixed(1) + ' \\u00b7 Lexical Resource ' + dr.scores.lexical.toFixed(1) + ' \\u00b7 Grammar ' + dr.scores.grammar.toFixed(1) + ' \\u00b7 Pronunciation ' + dr.scores.pronunciation.toFixed(1) + ' \\u00b7 Overall ' + dr.overall.toFixed(1)) : '';\n    out.detailComment = dr ? dr.comment : '';\n    out.detailAnnotated = dr ? (dr.annotated && dr.annotated.length ? dr.annotated : (dr.transcripts || []).map(t => ({\n      label: t.label, question: t.question, durText: t.dur + 's spoken',\n      segments: [{ text: t.transcript || '(no transcript captured)', bg: 'transparent', bd: 'transparent', fg: 'inherit', sup: '' }],\n      notes: [], hasNotes: false\n    }))) : [];\n    out.closeDetail = () => this.setState({ selResultId: null });\n\n    // student info\n    out.testTitle = S.test ? S.test.title : '';\n    out.testCode = S.test ? S.test.code : '';\n    out.name = S.name; out.onName = e => this.setState({ name: e.target.value, infoErr: '' });\n    out.klass = S.klass; out.onKlass = e => this.setState({ klass: e.target.value, infoErr: '' });\n    out.num = S.num; out.onNum = e => this.setState({ num: e.target.value, infoErr: '' });\n    out.infoErr = S.infoErr; out.hasInfoErr = !!S.infoErr;\n    out.infoContinue = () => {\n      if (!S.name.trim() || !S.klass.trim() || !S.num.trim()) { this.setState({ infoErr: 'Please fill in your full name, class and student number.' }); return; }\n      this.setState({ view: 'micCheck', micErr: '' });\n    };\n\n    // mic check\n    const policyBlocked = this.detectPolicyBlocked();\n    out.policyBlocked = policyBlocked;\n    out.micPolicyBlocked = policyBlocked && !S.micReady;\n    out.openUrl = S.openUrl;\n    out.openReady = policyBlocked && !!S.openUrl;\n    out.openNotReady = policyBlocked && !S.openUrl;\n    out.saveHandoff = () => this.saveHandoff();\n    out.micReady = S.micReady; out.micNotReady = !S.micReady && !policyBlocked;\n    out.micErr = S.micErr; out.hasMicErr = !!S.micErr;\n    out.srWarn = !S.srOk;\n    out.enableMic = async () => {\n      try {\n        this.stream = await navigator.mediaDevices.getUserMedia({ audio: true });\n        this.setState({ micReady: true, micErr: '' });\n      } catch (e) {\n        const msg = (e && e.name === 'NotFoundError')\n          ? 'No microphone was found. Please plug in or enable a microphone and try again.'\n          : 'Microphone access was blocked. Click the 🎙 / lock icon in your browser\\u2019s address bar, allow the microphone, then try again.';\n        this.setState({ micErr: msg });\n      }\n    };\n    out.startTest = () => this.startTest();\n\n    // test screen\n    const step = this.steps ? this.steps[S.stepIdx] : null;\n    const curPart = step ? step.part : 1;\n    out.partChips = [1, 2, 3].map(p => ({\n      label: 'Part ' + p,\n      bg: p === curPart ? '#1D3461' : '#EDF2FA',\n      fg: p === curPart ? '#FFFFFF' : '#8A97AE'\n    }));\n    out.stepLabel = step ? step.label : '';\n    out.showQuestion = !!(step && step.type === 'q');\n    out.stepQuestion = step && step.type === 'q' ? step.q : '';\n    out.isP2 = !!(step && (step.type === 'prep' || step.type === 'p2'));\n    out.isPrep = !!(step && step.type === 'prep');\n    out.cueTopic = S.test ? S.test.p2topic : '';\n    out.cueBullets = S.test ? (S.test.p2bullets || []) : [];\n    out.stepTimeText = this.fmt(S.stepLeft);\n    out.stepTimeColor = S.stepLeft <= 10 ? '#C4453A' : '#17233D';\n    out.totalTimeText = this.fmt(S.totalLeft);\n    out.totalColor = S.totalLeft <= 120 ? '#C4453A' : '#1D3461';\n    out.stepPct = step ? Math.max(0, Math.min(100, (S.stepLeft / step.seconds) * 100)).toFixed(1) + '%' : '0%';\n    out.isRec = S.isRec;\n    out.live = S.live;\n    out.hasLive = (this.props.showLiveTranscript ?? true) && !!S.live && S.isRec;\n    const isLast = this.steps && S.stepIdx === this.steps.length - 1;\n    out.nextLabel = step && step.type === 'prep' ? 'I\\u2019m ready \\u2014 start speaking' : (isLast ? 'Finish & submit test' : 'Next question \\u2192');\n    out.onNext = () => this.advance();\n    out.stepHint = step && step.type === 'prep' ? 'Think about your answer. Recording begins after this minute.' : (isLast ? 'Your answers will be sent for AI marking when you submit.' : 'Answer until the timer ends, or move on when you\\u2019re done.');\n\n    // results\n    out.studentName = S.name.trim() || 'student';\n    out.resultsSub = S.marking ? 'Your test has been submitted for marking.' : (S.report ? 'Here is your AI examiner\\u2019s report.' : 'Your recordings are below.');\n    out.isTab1 = S.tab === 1; out.isTab2 = S.tab === 2;\n    out.onTab1 = () => this.setState({ tab: 1 });\n    out.onTab2 = () => this.setState({ tab: 2 });\n    out.tab1Bg = S.tab === 1 ? '#1D3461' : '#EDF2FA'; out.tab1Fg = S.tab === 1 ? '#FFFFFF' : '#5A6A85';\n    out.tab2Bg = S.tab === 2 ? '#1D3461' : '#EDF2FA'; out.tab2Fg = S.tab === 2 ? '#FFFFFF' : '#5A6A85';\n    out.responses = S.responses.map(r => ({\n      label: r.label, question: r.question,\n      durText: r.dur + 's spoken',\n      transcript: r.transcript || '(no transcript captured)',\n      hasAudio: !!r.audioUrl,\n      audioEl: r.audioUrl ? React.createElement('audio', { controls: true, src: r.audioUrl, style: { width: '100%', marginTop: '12px', height: '40px', display: 'block' } }) : null\n    }));\n    out.marking = S.marking;\n    out.markErrText = S.markErr; out.hasMarkErr = !!S.markErr && !S.marking;\n    out.retryMark = () => { this.setState({ marking: true, markErr: '' }); this.runMarking(); };\n    out.hasReport = !!S.report && !S.marking;\n    const rep = S.report;\n    out.overallBand = rep ? rep.overall.toFixed(1) : '';\n    out.scoreCards = rep ? [\n      { name: 'FLUENCY & COHERENCE', band: rep.scores.fluency.toFixed(1) },\n      { name: 'LEXICAL RESOURCE', band: rep.scores.lexical.toFixed(1) },\n      { name: 'GRAMMATICAL RANGE & ACCURACY', band: rep.scores.grammar.toFixed(1) },\n      { name: 'PRONUNCIATION (ESTIMATED)', band: rep.scores.pronunciation.toFixed(1) }\n    ] : [];\n    out.reportComment = rep ? rep.comment : '';\n    out.annotated = rep ? (rep.annotated || []) : [];\n    const PAL = this.feedbackPalette();\n    out.feedbackLegend = Object.keys(PAL).map(k => ({ label: PAL[k].label, bg: PAL[k].bg, fg: PAL[k].fg }));\n\n    return out;\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
