  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t:center;font-family:'Sora',sans-serif;font-weight:700;font-size:16px;\">HL<\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:16px;line-height:1.2;\">Ms. Hien Le<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#5A6A85;font-weight:600;\">Speaking Feedback Studio<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <button onclick=\"{{ goTeacher }}\" style=\"background:transparent;border:1.5px solid #D6DFEF;color:#1D3461;font-weight:700;font-size:14px;padding:10px 18px;border-radius:12px;cursor:pointer;min-height:44px;\" style-hover=\"background:#E9F0FB;border-color:#1D3461;\">Teacher sign in<\u002Fbutton>\n  <\u002Fheader>\n\n  <sc-if value=\"{{ policyBlocked }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"max-width:860px;margin:0 auto;padding:14px 20px 0;\">\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;background:#FBF4E6;border:1px solid #EAD9B0;border-radius:14px;padding:12px 18px;\">\n        <div style=\"color:#8A611B;font-size:14px;font-weight:700;line-height:1.5;\">🎙 The microphone is blocked in this embedded preview. Open the full page to take the test.<\u002Fdiv>\n        <sc-if value=\"{{ openReady }}\" hint-placeholder-val=\"{{ false }}\">\n          <a href=\"{{ openUrl }}\" target=\"_blank\" rel=\"opener\" onclick=\"{{ saveHandoff }}\" style=\"display:inline-flex;align-items:center;background:#1D3461;color:#fff;text-decoration:none;border-radius:10px;padding:12px 18px;font-size:14px;font-weight:800;cursor:pointer;min-height:20px;white-space:nowrap;\" style-hover=\"background:#152A52;\">Open full page ↗<\u002Fa>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ openNotReady }}\" hint-placeholder-val=\"{{ false }}\">\n          <span style=\"color:#8A611B;font-size:13.5px;font-weight:700;\">Preparing…<\u002Fspan>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"max-width:860px;margin:0 auto;padding:44px 20px 8px;text-align:center;\">\n    <div style=\"display:inline-block;background:#E3ECFA;color:#1D3461;font-weight:800;font-size:13px;letter-spacing:.04em;padding:8px 16px;border-radius:999px;\">3 PARTS · 15 MINUTES · COLOUR-CODED CORRECTIONS<\u002Fdiv>\n    <h1 style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(30px,5.5vw,46px);line-height:1.12;margin:20px 0 14px;text-wrap:balance;\">Speak. Submit. See every correction.<\u002Fh1>\n    <p style=\"font-size:17px;color:#5A6A85;line-height:1.6;max-width:560px;margin:0 auto;text-wrap:pretty;\">Take your speaking test in your own voice, then get your words back with grammar, vocabulary and coherence corrections highlighted — plus band scores from your AI examiner.<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;flex-wrap:wrap;gap:20px;justify-content:center;align-items:stretch;padding:28px 20px 8px;max-width:900px;margin:0 auto;\">\n    <div style=\"flex:1 1 340px;max-width:420px;background:#fff;border:1px solid #E3E9F4;border-radius:20px;padding:28px;box-shadow:0 10px 30px rgba(29,52,97,.07);text-align:left;\">\n      <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:20px;\">I'm a student<\u002Fdiv>\n      <p style=\"color:#5A6A85;font-size:14.5px;line-height:1.55;margin:8px 0 18px;\">Enter the test code your teacher gave you to begin.<\u002Fp>\n      <input value=\"{{ codeInput }}\" onchange=\"{{ onCode }}\" placeholder=\"Test code — e.g. DEMO01\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #D6DFEF;border-radius:12px;padding:13px 16px;font-size:16px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;outline:none;color:#17233D;background:#FAFCFF;\" style-focus=\"border-color:#1D3461;\">\n      <sc-if value=\"{{ hasCodeErr }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"color:#C4453A;font-size:13.5px;font-weight:700;margin-top:8px;\">{{ codeErr }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <button onclick=\"{{ studentContinue }}\" style=\"width:100%;margin-top:14px;background:#1D3461;color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;cursor:pointer;min-height:48px;\" style-hover=\"background:#152A52;\">Start my test<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"flex:1 1 340px;max-width:420px;background:#1D3461;border-radius:20px;padding:28px;color:#fff;text-align:left;box-shadow:0 10px 30px rgba(29,52,97,.18);display:flex;flex-direction:column;\">\n      <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:20px;\">I'm the teacher<\u002Fdiv>\n      <p style=\"color:#C6D3EA;font-size:14.5px;line-height:1.55;margin:8px 0 18px;flex:1;\">Create tests with your own questions, review AI-marked results, and export scores to Excel.<\u002Fp>\n      <button onclick=\"{{ goTeacher }}\" style=\"width:100%;background:#fff;color:#1D3461;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;cursor:pointer;min-height:48px;\" style-hover=\"background:#E3ECFA;\">Open teacher dashboard<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"display:flex;flex-wrap:wrap;gap:14px;justify-content:center;max-width:900px;margin:0 auto;padding:24px 20px 48px;\">\n    <div style=\"flex:1 1 240px;background:#fff;border:1px solid #E3E9F4;border-radius:16px;padding:18px 20px;\">\n      <div style=\"font-weight:800;font-size:13px;color:#1D3461;letter-spacing:.05em;\">PART 1 · INTERVIEW<\u002Fdiv>\n      <div style=\"color:#5A6A85;font-size:14px;margin-top:6px;\">4 questions · 40 seconds each<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1 1 240px;background:#fff;border:1px solid #E3E9F4;border-radius:16px;padding:18px 20px;\">\n      <div style=\"font-weight:800;font-size:13px;color:#1D3461;letter-spacing:.05em;\">PART 2 · LONG TURN<\u002Fdiv>\n      <div style=\"color:#5A6A85;font-size:14px;margin-top:6px;\">1 min preparation · 2 min talk<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:1 1 240px;background:#fff;border:1px solid #E3E9F4;border-radius:16px;padding:18px 20px;\">\n      <div style=\"font-weight:800;font-size:13px;color:#1D3461;letter-spacing:.05em;\">PART 3 · DISCUSSION<\u002Fdiv>\n      <div style=\"color:#5A6A85;font-size:14px;margin-top:6px;\">3 questions · 1 minute each<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ TEACHER LOGIN ============ -->\n<sc-if value=\"{{ isTeacherLogin }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Teacher login\" style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;\">\n  <div style=\"width:min(400px,100%);background:#fff;border:1px solid #E3E9F4;border-radius:20px;padding:32px;box-shadow:0 10px 30px rgba(29,52,97,.08);\">\n    <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:22px;\">Teacher sign in<\u002Fdiv>\n    <p style=\"color:#5A6A85;font-size:14px;margin:8px 0 18px;\">Enter your passcode to open the dashboard.<\u002Fp>\n    <input type=\"password\" value=\"{{ pass }}\" onchange=\"{{ onPass }}\" placeholder=\"Passcode\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #D6DFEF;border-radius:12px;padding:13px 16px;font-size:16px;outline:none;background:#FAFCFF;\" style-focus=\"border-color:#1D3461;\">\n    <sc-if value=\"{{ passErr }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"color:#C4453A;font-size:13.5px;font-weight:700;margin-top:8px;\">Incorrect passcode. Please try again.<\u002Fdiv>\n    <\u002Fsc-if>\n    <button onclick=\"{{ submitPass }}\" style=\"width:100%;margin-top:14px;background:#1D3461;color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;cursor:pointer;min-height:48px;\" style-hover=\"background:#152A52;\">Sign in<\u002Fbutton>\n    <button onclick=\"{{ goHome }}\" style=\"width:100%;margin-top:10px;background:transparent;border:none;color:#5A6A85;font-weight:700;font-size:14px;cursor:pointer;padding:8px;\" style-hover=\"color:#1D3461;\">← Back to home<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ TEACHER DASHBOARD ============ -->\n<sc-if value=\"{{ isTeacher }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Teacher dashboard\">\n  <header style=\"background:#fff;border-bottom:1px solid #E3E9F4;\">\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 24px;max-width:1080px;margin:0 auto;\">\n      <div style=\"display:flex;align-items:center;gap:12px;\">\n        <div style=\"width:38px;height:38px;border-radius:12px;background:#1D3461;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;font-weight:700;font-size:14px;\">HL<\u002Fdiv>\n        <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:16px;\">Teacher dashboard<\u002Fdiv>\n      <\u002Fdiv>\n      <button onclick=\"{{ signOut }}\" style=\"background:transparent;border:1.5px solid #D6DFEF;color:#5A6A85;font-weight:700;font-size:13.5px;padding:9px 16px;border-radius:10px;cursor:pointer;\" style-hover=\"color:#1D3461;border-color:#1D3461;\">Sign out<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"max-width:1080px;margin:0 auto;padding:28px 20px 60px;\">\n\n    <sc-if value=\"{{ editorOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#fff;border:1px solid #E3E9F4;border-radius:20px;padding:28px;max-width:760px;margin:0 auto;\">\n        <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:22px;margin-bottom:4px;\">{{ editorHeading }}<\u002Fdiv>\n        <p style=\"color:#5A6A85;font-size:14px;margin:0 0 22px;\">Students will see these questions in order. Timings are fixed by the IELTS format.<\u002Fp>\n\n        <label style=\"display:block;font-weight:800;font-size:13px;color:#1D3461;letter-spacing:.04em;margin-bottom:6px;\">TEST TITLE<\u002Flabel>\n        <input value=\"{{ editorTitle }}\" onchange=\"{{ onEditorTitle }}\" placeholder=\"e.g. Speaking Mock Test — Unit 5\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #D6DFEF;border-radius:12px;padding:12px 14px;font-size:15px;outline:none;background:#FAFCFF;margin-bottom:22px;\" style-focus=\"border-color:#1D3461;\">\n\n        <div style=\"font-weight:800;font-size:13px;color:#1D3461;letter-spacing:.04em;margin-bottom:4px;\">PART 1 — INTERVIEW <span style=\"color:#8A97AE;font-weight:700;\">(40 seconds per answer)<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:22px;\">\n          <sc-for list=\"{{ editorP1 }}\" as=\"q\" hint-placeholder-count=\"4\">\n            <input value=\"{{ q.value }}\" onchange=\"{{ q.onChange }}\" placeholder=\"{{ q.label }}\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #D6DFEF;border-radius:12px;padding:12px 14px;font-size:15px;outline:none;background:#FAFCFF;\" style-focus=\"border-color:#1D3461;\">\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"font-weight:800;font-size:13px;color:#1D3461;letter-spacing:.04em;margin-bottom:4px;\">PART 2 — CUE CARD <span style=\"color:#8A97AE;font-weight:700;\">(1 min prep · 2 min talk)<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:22px;\">\n          <input value=\"{{ editorP2Topic }}\" onchange=\"{{ onP2Topic }}\" placeholder=\"Topic — e.g. Describe a person who has inspired you.\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #D6DFEF;border-radius:12px;padding:12px 14px;font-size:15px;outline:none;background:#FAFCFF;\" style-focus=\"border-color:#1D3461;\">\n          <textarea value=\"{{ editorP2Bullets }}\" onchange=\"{{ onP2Bullets }}\" rows=\"4\" placeholder=\"You should say… (one point per line)\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #D6DFEF;border-radius:12px;padding:12px 14px;font-size:15px;outline:none;background:#FAFCFF;resize:vertical;\" style-focus=\"border-color:#1D3461;\"><\u002Ftextarea>\n        <\u002Fdiv>\n\n        <div style=\"font-weight:800;font-size:13px;color:#1D3461;letter-spacing:.04em;margin-bottom:4px;\">PART 3 — DISCUSSION <span style=\"color:#8A97AE;font-weight:700;\">(1 minute per answer)<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:22px;\">\n          <sc-for list=\"{{ editorP3 }}\" as=\"q\" hint-placeholder-count=\"3\">\n            <input value=\"{{ q.value }}\" onchange=\"{{ q.onChange }}\" placeholder=\"{{ q.label }}\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #D6DFEF;border-radius:12px;padding:12px 14px;font-size:15px;outline:none;background:#FAFCFF;\" style-focus=\"border-color:#1D3461;\">\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ hasEditorErr }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"color:#C4453A;font-size:14px;font-weight:700;margin-bottom:12px;\">{{ editorErr }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:flex;gap:12px;flex-wrap:wrap;\">\n          <button onclick=\"{{ saveEditor }}\" style=\"background:#1D3461;color:#fff;border:none;border-radius:12px;padding:13px 26px;font-size:15px;font-weight:800;cursor:pointer;min-height:48px;\" style-hover=\"background:#152A52;\">Save test<\u002Fbutton>\n          <button onclick=\"{{ cancelEditor }}\" style=\"background:transparent;border:1.5px solid #D6DFEF;color:#5A6A85;border-radius:12px;padding:13px 22px;font-size:15px;font-weight:700;cursor:pointer;\" style-hover=\"color:#1D3461;border-color:#1D3461;\">Cancel<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ notEditorOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:18px;\">\n        <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:22px;\">Your tests<\u002Fdiv>\n        <button onclick=\"{{ newTest }}\" style=\"background:#1D3461;color:#fff;border:none;border-radius:12px;padding:12px 20px;font-size:14.5px;font-weight:800;cursor:pointer;min-height:44px;\" style-hover=\"background:#152A52;\">+ New test<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;flex-direction:column;gap:12px;\">\n        <sc-for list=\"{{ testCards }}\" as=\"t\" hint-placeholder-count=\"2\">\n          <div style=\"background:#fff;border:1px solid #E3E9F4;border-radius:16px;padding:18px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;\">\n            <div style=\"background:#E3ECFA;color:#1D3461;font-weight:800;font-size:14px;letter-spacing:.08em;padding:8px 14px;border-radius:10px;font-family:'Sora',sans-serif;\">{{ t.code }}<\u002Fdiv>\n            <div style=\"flex:1;min-width:180px;\">\n              <div style=\"font-weight:800;font-size:16px;\">{{ t.title }}<\u002Fdiv>\n              <div style=\"color:#5A6A85;font-size:13px;margin-top:2px;\">{{ t.meta }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n              <button onclick=\"{{ t.onResults }}\" style=\"background:#1D3461;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:13.5px;font-weight:800;cursor:pointer;min-height:42px;\" style-hover=\"background:#152A52;\">Results<\u002Fbutton>\n              <button onclick=\"{{ t.onExport }}\" style=\"background:#E9F5EF;color:#1F8A5B;border:none;border-radius:10px;padding:10px 16px;font-size:13.5px;font-weight:800;cursor:pointer;min-height:42px;\" style-hover=\"background:#D8EEE2;\">Export Excel<\u002Fbutton>\n              <button onclick=\"{{ t.onEdit }}\" style=\"background:transparent;border:1.5px solid #D6DFEF;color:#5A6A85;border-radius:10px;padding:10px 16px;font-size:13.5px;font-weight:700;cursor:pointer;min-height:42px;\" style-hover=\"color:#1D3461;border-color:#1D3461;\">Edit<\u002Fbutton>\n              <button onclick=\"{{ t.onDelete }}\" style=\"background:transparent;border:none;color:#B0BACB;border-radius:10px;padding:10px 8px;font-size:13.5px;font-weight:700;cursor:pointer;\" style-hover=\"color:#C4453A;\">Delete<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ hasExportMsg }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:12px;color:#1F8A5B;font-weight:700;font-size:14px;\">{{ exportMsg }}<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ hasSelected }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:32px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px;\">\n            <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:19px;\">Results — {{ selTitle }} <span style=\"color:#8A97AE;font-weight:600;font-size:15px;\">({{ selCode }})<\u002Fspan><\u002Fdiv>\n            <button onclick=\"{{ onExportSel }}\" style=\"background:#1F8A5B;color:#fff;border:none;border-radius:10px;padding:11px 18px;font-size:13.5px;font-weight:800;cursor:pointer;min-height:44px;\" style-hover=\"background:#187249;\">⬇ Export to Excel<\u002Fbutton>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ hasRows }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"overflow-x:auto;background:#fff;border:1px solid #E3E9F4;border-radius:16px;\">\n              <div style=\"min-width:880px;\">\n                <div style=\"display:grid;grid-template-columns:1.6fr .8fr .9fr .9fr repeat(5,72px) 84px;gap:0;padding:12px 16px;border-bottom:1px solid #E3E9F4;font-size:12px;font-weight:800;color:#8A97AE;letter-spacing:.05em;\">\n                  <div>STUDENT<\u002Fdiv><div>CLASS<\u002Fdiv><div>NUMBER<\u002Fdiv><div>DATE<\u002Fdiv><div style=\"text-align:center;\">FC<\u002Fdiv><div style=\"text-align:center;\">LR<\u002Fdiv><div style=\"text-align:center;\">GRA<\u002Fdiv><div style=\"text-align:center;\">PRON<\u002Fdiv><div style=\"text-align:center;\">OVERALL<\u002Fdiv><div><\u002Fdiv>\n                <\u002Fdiv>\n                <sc-for list=\"{{ resultRows }}\" as=\"r\" hint-placeholder-count=\"3\">\n                  <div style=\"display:grid;grid-template-columns:1.6fr .8fr .9fr .9fr repeat(5,72px) 84px;align-items:center;padding:12px 16px;border-bottom:1px solid #EFF3FA;font-size:14px;\">\n                    <div style=\"font-weight:800;\">{{ r.name }}<\u002Fdiv>\n                    <div style=\"color:#5A6A85;\">{{ r.klass }}<\u002Fdiv>\n                    <div style=\"color:#5A6A85;\">{{ r.num }}<\u002Fdiv>\n                    <div style=\"color:#5A6A85;\">{{ r.date }}<\u002Fdiv>\n                    <div style=\"text-align:center;font-weight:700;\">{{ r.f }}<\u002Fdiv>\n                    <div style=\"text-align:center;font-weight:700;\">{{ r.l }}<\u002Fdiv>\n                    <div style=\"text-align:center;font-weight:700;\">{{ r.g }}<\u002Fdiv>\n                    <div style=\"text-align:center;font-weight:700;\">{{ r.p }}<\u002Fdiv>\n                    <div style=\"text-align:center;font-weight:800;color:#1D3461;\">{{ r.o }}<\u002Fdiv>\n                    <button onclick=\"{{ r.onView }}\" style=\"background:#E3ECFA;color:#1D3461;border:none;border-radius:8px;padding:7px 10px;font-size:12.5px;font-weight:800;cursor:pointer;\" style-hover=\"background:#D2E1F7;\">View<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noRows }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#fff;border:1px dashed #D6DFEF;border-radius:16px;padding:28px;text-align:center;color:#8A97AE;font-size:14.5px;\">No submissions yet. Share the code <b>{{ selCode }}<\u002Fb> with your students.<\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ hasSelResult }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:16px;background:#fff;border:1px solid #E3E9F4;border-radius:16px;padding:24px;\">\n              <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:12px;\">\n                <div>\n                  <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:18px;\">{{ detailName }}<\u002Fdiv>\n                  <div style=\"color:#5A6A85;font-size:13.5px;margin-top:2px;\">{{ detailMeta }}<\u002Fdiv>\n                <\u002Fdiv>\n                <button onclick=\"{{ closeDetail }}\" style=\"background:transparent;border:none;color:#8A97AE;font-size:14px;font-weight:800;cursor:pointer;padding:6px;\" style-hover=\"color:#1D3461;\">✕ Close<\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"margin-top:12px;font-weight:800;color:#1D3461;font-size:14.5px;\">{{ detailScoreLine }}<\u002Fdiv>\n              <p style=\"margin:12px 0 0;color:#374766;font-size:14.5px;line-height:1.6;\">{{ detailComment }}<\u002Fp>\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:16px;\">\n                <div style=\"font-weight:800;font-size:13px;color:#1D3461;letter-spacing:.04em;\">ANSWERS WITH CORRECTIONS<\u002Fdiv>\n                <div style=\"display:flex;gap:6px;flex-wrap:wrap;\">\n                  <sc-for list=\"{{ feedbackLegend }}\" as=\"fl\" hint-placeholder-count=\"5\">\n                    <span style=\"background:{{ fl.bg }};color:{{ fl.fg }};font-size:11px;font-weight:800;padding:3px 9px;border-radius:999px;\">{{ fl.label }}<\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:8px;\">\n                <sc-for list=\"{{ detailAnnotated }}\" as=\"a\" hint-placeholder-count=\"3\">\n                  <div style=\"background:#F7FAFE;border:1px solid #EAF0FA;border-radius:12px;padding:12px 14px;\">\n                    <div style=\"font-size:12.5px;font-weight:800;color:#8A97AE;\">{{ a.label }} · {{ a.durText }}<\u002Fdiv>\n                    <div style=\"font-size:13.5px;color:#374766;margin-top:4px;font-style:italic;\">“{{ a.question }}”<\u002Fdiv>\n                    <div style=\"font-size:14px;color:#17233D;margin-top:8px;line-height:1.9;\"><sc-for list=\"{{ a.segments }}\" as=\"sg\" hint-placeholder-count=\"5\"><span style=\"background:{{ sg.bg }};color:{{ sg.fg }};border-bottom:2px solid {{ sg.bd }};border-radius:4px;padding:1px 2px;\">{{ sg.text }}<sup style=\"font-size:10px;font-weight:800;\">{{ sg.sup }}<\u002Fsup><\u002Fspan><\u002Fsc-for><\u002Fdiv>\n                    <sc-if value=\"{{ a.hasNotes }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"display:flex;flex-direction:column;gap:6px;margin-top:10px;border-top:1px dashed #D6DFEF;padding-top:10px;\">\n                        <sc-for list=\"{{ a.notes }}\" as=\"n\" hint-placeholder-count=\"2\">\n                          <div style=\"font-size:13px;color:#374766;line-height:1.7;\">\n                            <span style=\"background:{{ n.chipBg }};color:{{ n.chipFg }};font-size:10.5px;font-weight:800;padding:2px 7px;border-radius:999px;margin-right:6px;white-space:nowrap;\">{{ n.num }} · {{ n.typeLabel }}<\u002Fspan>\n                            <s style=\"color:#8A97AE;\">{{ n.quote }}<\u002Fs> <b style=\"color:#1F8A5B;\">→ {{ n.fix }}<\u002Fb> — {{ n.note }}\n                          <\u002Fdiv>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ STUDENT INFO ============ -->\n<sc-if value=\"{{ isStudentInfo }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Student details\" style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;\">\n  <div style=\"width:min(440px,100%);background:#fff;border:1px solid #E3E9F4;border-radius:20px;padding:32px;box-shadow:0 10px 30px rgba(29,52,97,.08);\">\n    <div style=\"display:inline-block;background:#E3ECFA;color:#1D3461;font-weight:800;font-size:12.5px;letter-spacing:.08em;padding:6px 12px;border-radius:999px;\">{{ testCode }}<\u002Fdiv>\n    <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:22px;margin-top:12px;\">{{ testTitle }}<\u002Fdiv>\n    <p style=\"color:#5A6A85;font-size:14px;margin:8px 0 20px;line-height:1.55;\">Please fill in your details exactly as your teacher knows them — they will appear on your result.<\u002Fp>\n    <div style=\"display:flex;flex-direction:column;gap:12px;\">\n      <div>\n        <label style=\"display:block;font-weight:800;font-size:12.5px;color:#1D3461;letter-spacing:.04em;margin-bottom:5px;\">FULL NAME<\u002Flabel>\n        <input value=\"{{ name }}\" onchange=\"{{ onName }}\" placeholder=\"e.g. Nguyen Thi Mai\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #D6DFEF;border-radius:12px;padding:13px 15px;font-size:16px;outline:none;background:#FAFCFF;\" style-focus=\"border-color:#1D3461;\">\n      <\u002Fdiv>\n      <div>\n        <label style=\"display:block;font-weight:800;font-size:12.5px;color:#1D3461;letter-spacing:.04em;margin-bottom:5px;\">CLASS<\u002Flabel>\n        <input value=\"{{ klass }}\" onchange=\"{{ onKlass }}\" placeholder=\"e.g. 11A2\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #D6DFEF;border-radius:12px;padding:13px 15px;font-size:16px;outline:none;background:#FAFCFF;\" style-focus=\"border-color:#1D3461;\">\n      <\u002Fdiv>\n      <div>\n        <label style=\"display:block;font-weight:800;font-size:12.5px;color:#1D3461;letter-spacing:.04em;margin-bottom:5px;\">STUDENT NUMBER<\u002Flabel>\n        <input value=\"{{ num }}\" onchange=\"{{ onNum }}\" placeholder=\"e.g. 23\" style=\"width:100%;box-sizing:border-box;border:1.5px solid #D6DFEF;border-radius:12px;padding:13px 15px;font-size:16px;outline:none;background:#FAFCFF;\" style-focus=\"border-color:#1D3461;\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <sc-if value=\"{{ hasInfoErr }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"color:#C4453A;font-size:13.5px;font-weight:700;margin-top:10px;\">{{ infoErr }}<\u002Fdiv>\n    <\u002Fsc-if>\n    <button onclick=\"{{ infoContinue }}\" style=\"width:100%;margin-top:18px;background:#1D3461;color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;cursor:pointer;min-height:48px;\" style-hover=\"background:#152A52;\">Continue →<\u002Fbutton>\n    <button onclick=\"{{ goHome }}\" style=\"width:100%;margin-top:10px;background:transparent;border:none;color:#5A6A85;font-weight:700;font-size:14px;cursor:pointer;padding:8px;\" style-hover=\"color:#1D3461;\">← Back<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ MIC CHECK ============ -->\n<sc-if value=\"{{ isMicCheck }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Mic check\" style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;\">\n  <div style=\"width:min(520px,100%);background:#fff;border:1px solid #E3E9F4;border-radius:20px;padding:32px;box-shadow:0 10px 30px rgba(29,52,97,.08);\">\n    <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:22px;\">Before you start<\u002Fdiv>\n    <ul style=\"margin:14px 0 20px;padding-left:20px;color:#374766;font-size:14.5px;line-height:1.9;\">\n      <li>The whole test lasts <b>15 minutes maximum<\u002Fb> — it cannot be paused or extended.<\u002Fli>\n      <li><b>Part 1:<\u002Fb> 4 questions, 40 seconds to answer each.<\u002Fli>\n      <li><b>Part 2:<\u002Fb> 1 minute to prepare, then speak for 2 minutes.<\u002Fli>\n      <li><b>Part 3:<\u002Fb> 3 questions, 1 minute to answer each.<\u002Fli>\n      <li>Recording starts automatically with each question. Speak clearly, in English.<\u002Fli>\n      <li>Find a quiet place and don't refresh the page during the test.<\u002Fli>\n    <\u002Ful>\n    <sc-if value=\"{{ srWarn }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF4E6;border:1px solid #EAD9B0;color:#8A611B;border-radius:12px;padding:12px 14px;font-size:13.5px;line-height:1.5;margin-bottom:14px;\"><b>Heads up:<\u002Fb> this browser can't transcribe speech, so AI marking may not work. Please use <b>Google Chrome<\u002Fb> (computer or Android) for full marking.<\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ micPolicyBlocked }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#FBF4E6;border:1px solid #EAD9B0;color:#8A611B;border-radius:12px;padding:12px 14px;font-size:13.5px;line-height:1.5;margin-bottom:12px;\">🎙 The microphone can't be used inside this embedded preview. Click below to open the test in its own window — your details will be kept.<\u002Fdiv>\n      <sc-if value=\"{{ openReady }}\" hint-placeholder-val=\"{{ false }}\">\n        <a href=\"{{ openUrl }}\" target=\"_blank\" rel=\"opener\" onclick=\"{{ saveHandoff }}\" style=\"display:flex;align-items:center;justify-content:center;box-sizing:border-box;width:100%;background:#1D3461;color:#fff;text-decoration:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;cursor:pointer;min-height:48px;\" style-hover=\"background:#152A52;\">Open the test in a new window ↗<\u002Fa>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ openNotReady }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;color:#8A97AE;font-size:14px;font-weight:700;padding:14px;\">Preparing the test window…<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ micNotReady }}\" hint-placeholder-val=\"{{ true }}\">\n      <button onclick=\"{{ enableMic }}\" style=\"width:100%;background:#1D3461;color:#fff;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;cursor:pointer;min-height:48px;\" style-hover=\"background:#152A52;\">🎙 Enable my microphone<\u002Fbutton>\n      <sc-if value=\"{{ hasMicErr }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"color:#C4453A;font-size:13.5px;font-weight:700;margin-top:10px;\">{{ micErr }}<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n    <sc-if value=\"{{ micReady }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;align-items:center;gap:10px;background:#E9F5EF;border:1px solid #CBE7D8;color:#1F8A5B;border-radius:12px;padding:12px 14px;font-weight:800;font-size:14.5px;margin-bottom:14px;\">\n        <span style=\"width:10px;height:10px;border-radius:50%;background:#1F8A5B;display:inline-block;\"><\u002Fspan>Microphone ready\n      <\u002Fdiv>\n      <button onclick=\"{{ startTest }}\" style=\"width:100%;background:#1F8A5B;color:#fff;border:none;border-radius:12px;padding:15px;font-size:17px;font-weight:800;cursor:pointer;min-height:52px;\" style-hover=\"background:#187249;\">Start the test now<\u002Fbutton>\n      <div style=\"text-align:center;color:#8A97AE;font-size:13px;margin-top:10px;\">The 15-minute timer begins immediately.<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ TEST ============ -->\n<sc-if value=\"{{ isTest }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Speaking test\" style=\"min-height:100vh;display:flex;flex-direction:column;\">\n  <div style=\"background:#fff;border-bottom:1px solid #E3E9F4;position:sticky;top:0;z-index:5;\">\n    <div style=\"max-width:820px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;\">\n      <div style=\"display:flex;gap:6px;\">\n        <sc-for list=\"{{ partChips }}\" as=\"c\" hint-placeholder-count=\"3\">\n          <div style=\"padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:800;letter-spacing:.03em;background:{{ c.bg }};color:{{ c.fg }};\">{{ c.label }}<\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"text-align:right;\">\n        <div style=\"font-size:11px;font-weight:800;color:#8A97AE;letter-spacing:.06em;\">TOTAL TIME LEFT<\u002Fdiv>\n        <div style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:18px;font-variant-numeric:tabular-nums;color:{{ totalColor }};\">{{ totalTimeText }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex:1;display:flex;align-items:center;justify-content:center;padding:24px 20px 40px;\">\n    <div style=\"width:min(680px,100%);\">\n      <div style=\"text-align:center;color:#5A6A85;font-weight:800;font-size:14px;letter-spacing:.04em;\">{{ stepLabel }}<\u002Fdiv>\n\n      <div style=\"text-align:center;margin:18px 0;\">\n        <div style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:56px;font-variant-numeric:tabular-nums;line-height:1;color:{{ stepTimeColor }};\">{{ stepTimeText }}<\u002Fdiv>\n        <div style=\"height:8px;background:#E3E9F4;border-radius:999px;margin:16px auto 0;max-width:420px;overflow:hidden;\">\n          <div style=\"height:100%;border-radius:999px;background:#1D3461;width:{{ stepPct }};transition:width 1s linear;\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid #E3E9F4;border-radius:20px;padding:30px;box-shadow:0 10px 30px rgba(29,52,97,.07);\">\n        <sc-if value=\"{{ showQuestion }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:clamp(20px,3.4vw,26px);line-height:1.4;text-align:center;text-wrap:balance;\">{{ stepQuestion }}<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ isP2 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:clamp(19px,3.2vw,24px);line-height:1.4;text-align:center;text-wrap:balance;\">{{ cueTopic }}<\u002Fdiv>\n          <div style=\"margin-top:16px;background:#F7FAFE;border:1px solid #EAF0FA;border-radius:14px;padding:16px 20px;\">\n            <div style=\"font-weight:800;font-size:13px;color:#1D3461;letter-spacing:.04em;margin-bottom:6px;\">YOU SHOULD SAY:<\u002Fdiv>\n            <ul style=\"margin:0;padding-left:20px;color:#374766;font-size:15px;line-height:1.8;\">\n              <sc-for list=\"{{ cueBullets }}\" as=\"b\" hint-placeholder-count=\"4\">\n                <li>{{ b }}<\u002Fli>\n              <\u002Fsc-for>\n            <\u002Ful>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ isPrep }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:16px;text-align:center;color:#8A611B;background:#FBF4E6;border-radius:12px;padding:10px 14px;font-weight:700;font-size:14px;\">✏️ Preparation time — think about what you will say. Recording has not started yet.<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <div style=\"display:flex;align-items:center;justify-content:center;gap:10px;margin-top:22px;min-height:24px;\">\n          <sc-if value=\"{{ isRec }}\" hint-placeholder-val=\"{{ false }}\">\n            <span style=\"width:12px;height:12px;border-radius:50%;background:#C4453A;display:inline-block;animation:recpulse 1.2s ease-in-out infinite;\"><\u002Fspan>\n            <span style=\"color:#C4453A;font-weight:800;font-size:14px;letter-spacing:.03em;\">RECORDING — speak now<\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <sc-if value=\"{{ hasLive }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top:10px;text-align:center;color:#8A97AE;font-size:13.5px;font-style:italic;line-height:1.5;\">…{{ live }}<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div style=\"text-align:center;margin-top:20px;\">\n        <button onclick=\"{{ onNext }}\" style=\"background:#1D3461;color:#fff;border:none;border-radius:12px;padding:14px 32px;font-size:16px;font-weight:800;cursor:pointer;min-height:48px;\" style-hover=\"background:#152A52;\">{{ nextLabel }}<\u002Fbutton>\n        <div style=\"color:#8A97AE;font-size:13px;margin-top:10px;\">{{ stepHint }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ RESULTS ============ -->\n<sc-if value=\"{{ isResults }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-screen-label=\"Results\" style=\"min-height:100vh;\">\n  <div style=\"max-width:760px;margin:0 auto;padding:36px 20px 60px;\">\n    <div style=\"text-align:center;\">\n      <div style=\"display:inline-block;background:#E9F5EF;color:#1F8A5B;font-weight:800;font-size:13px;letter-spacing:.05em;padding:8px 16px;border-radius:999px;\">TEST SUBMITTED<\u002Fdiv>\n      <h2 style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:clamp(24px,4.5vw,32px);margin:14px 0 6px;\">Well done, {{ studentName }}!<\u002Fh2>\n      <p style=\"color:#5A6A85;font-size:15px;margin:0;\">{{ resultsSub }}<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;gap:8px;justify-content:center;margin:26px 0 22px;\">\n      <button onclick=\"{{ onTab1 }}\" style=\"border:none;border-radius:999px;padding:11px 20px;font-size:14px;font-weight:800;cursor:pointer;min-height:44px;background:{{ tab1Bg }};color:{{ tab1Fg }};\">1 · My recordings<\u002Fbutton>\n      <button onclick=\"{{ onTab2 }}\" style=\"border:none;border-radius:999px;padding:11px 20px;font-size:14px;font-weight:800;cursor:pointer;min-height:44px;background:{{ tab2Bg }};color:{{ tab2Fg }};\">2 · AI marking &amp; feedback<\u002Fbutton>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ isTab1 }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flex-direction:column;gap:12px;\">\n        <sc-for list=\"{{ responses }}\" as=\"r\" hint-placeholder-count=\"4\">\n          <div style=\"background:#fff;border:1px solid #E3E9F4;border-radius:16px;padding:18px 20px;\">\n            <div style=\"display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;\">\n              <div style=\"font-weight:800;font-size:13px;color:#1D3461;letter-spacing:.04em;\">{{ r.label }}<\u002Fdiv>\n              <div style=\"color:#8A97AE;font-size:13px;font-weight:700;\">{{ r.durText }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"font-size:15px;color:#374766;margin-top:6px;font-style:italic;\">“{{ r.question }}”<\u002Fdiv>\n            <sc-if value=\"{{ r.hasAudio }}\" hint-placeholder-val=\"{{ false }}\">\n              <span class=\"sc-audio-slot\">{{ r.audioEl }}<\u002Fspan>\n            <\u002Fsc-if>\n            <div style=\"margin-top:10px;background:#F7FAFE;border-radius:10px;padding:10px 14px;font-size:14px;color:#374766;line-height:1.55;\">{{ r.transcript }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ isTab2 }}\" hint-placeholder-val=\"{{ true }}\">\n      <sc-if value=\"{{ marking }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"text-align:center;padding:50px 20px;\">\n          <div style=\"width:44px;height:44px;border:4px solid #E3E9F4;border-top-color:#1D3461;border-radius:50%;margin:0 auto;animation:spin .9s linear infinite;\"><\u002Fdiv>\n          <div style=\"font-family:'Sora',sans-serif;font-weight:700;font-size:18px;margin-top:18px;\">Your AI examiner is marking your test…<\u002Fdiv>\n          <div style=\"color:#5A6A85;font-size:14px;margin-top:6px;\">This usually takes under a minute. Please keep this page open.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ hasMarkErr }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#FDF1F0;border:1px solid #F0CCC8;border-radius:16px;padding:22px;text-align:center;\">\n          <div style=\"color:#C4453A;font-weight:800;font-size:15px;line-height:1.55;\">{{ markErrText }}<\u002Fdiv>\n          <button onclick=\"{{ retryMark }}\" style=\"margin-top:14px;background:#1D3461;color:#fff;border:none;border-radius:12px;padding:12px 24px;font-size:14.5px;font-weight:800;cursor:pointer;min-height:44px;\" style-hover=\"background:#152A52;\">Try marking again<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ hasReport }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:#1D3461;border-radius:20px;padding:26px;text-align:center;color:#fff;\">\n          <div style=\"font-weight:800;font-size:13px;letter-spacing:.08em;color:#9FB4DA;\">OVERALL BAND SCORE<\u002Fdiv>\n          <div style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:64px;line-height:1.1;\">{{ overallBand }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:12px;\">\n          <sc-for list=\"{{ scoreCards }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff;border:1px solid #E3E9F4;border-radius:16px;padding:18px;text-align:center;\">\n              <div style=\"font-family:'Sora',sans-serif;font-weight:800;font-size:30px;color:#1D3461;\">{{ s.band }}<\u002Fdiv>\n              <div style=\"color:#5A6A85;font-size:12.5px;font-weight:800;letter-spacing:.03em;margin-top:4px;\">{{ s.name }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E3E9F4;border-radius:16px;padding:24px;margin-top:12px;\">\n          <div style=\"font-weight:800;font-size:13px;color:#1D3461;letter-spacing:.04em;\">EXAMINER'S COMMENT<\u002Fdiv>\n          <p style=\"margin:10px 0 0;color:#374766;font-size:15px;line-height:1.65;\">{{ reportComment }}<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#fff;border:1px solid #E3E9F4;border-radius:16px;padding:24px;margin-top:12px;\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;\">\n            <div style=\"font-weight:800;font-size:13px;color:#1D3461;letter-spacing:.04em;\">YOUR ANSWERS, CORRECTED<\u002Fdiv>\n            <div style=\"display:flex;gap:6px;flex-wrap:wrap;\">\n              <sc-for list=\"{{ feedbackLegend }}\" as=\"fl\" hint-placeholder-count=\"5\">\n                <span style=\"background:{{ fl.bg }};color:{{ fl.fg }};font-size:11.5px;font-weight:800;padding:4px 10px;border-radius:999px;\">{{ fl.label }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:14px;margin-top:14px;\">\n            <sc-for list=\"{{ annotated }}\" as=\"a\" hint-placeholder-count=\"3\">\n              <div style=\"background:#F7FAFE;border:1px solid #EAF0FA;border-radius:14px;padding:16px 18px;\">\n                <div style=\"display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;\">\n                  <div style=\"font-weight:800;font-size:12.5px;color:#8A97AE;letter-spacing:.04em;\">{{ a.label }}<\u002Fdiv>\n                  <div style=\"color:#8A97AE;font-size:12.5px;font-weight:700;\">{{ a.durText }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-size:14px;color:#374766;margin-top:4px;font-style:italic;\">“{{ a.question }}”<\u002Fdiv>\n                <div style=\"font-size:15px;color:#17233D;margin-top:10px;line-height:1.95;\"><sc-for list=\"{{ a.segments }}\" as=\"sg\" hint-placeholder-count=\"5\"><span style=\"background:{{ sg.bg }};color:{{ sg.fg }};border-bottom:2px solid {{ sg.bd }};border-radius:4px;padding:1px 2px;\">{{ sg.text }}<sup style=\"font-size:10px;font-weight:800;\">{{ sg.sup }}<\u002Fsup><\u002Fspan><\u002Fsc-for><\u002Fdiv>\n                <sc-if value=\"{{ a.hasNotes }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"display:flex;flex-direction:column;gap:8px;margin-top:12px;border-top:1px dashed #D6DFEF;padding-top:12px;\">\n                    <sc-for list=\"{{ a.notes }}\" as=\"n\" hint-placeholder-count=\"2\">\n                      <div style=\"font-size:13.5px;color:#374766;line-height:1.7;\">\n                        <span style=\"background:{{ n.chipBg }};color:{{ n.chipFg }};font-size:11px;font-weight:800;padding:3px 8px;border-radius:999px;margin-right:6px;white-space:nowrap;\">{{ n.num }} · {{ n.typeLabel }}<\u002Fspan>\n                        <s style=\"color:#8A97AE;\">{{ n.quote }}<\u002Fs> <b style=\"color:#1F8A5B;\">→ {{ n.fix }}<\u002Fb> — {{ n.note }}\n                      <\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ a.noNotes }}\" hint-placeholder-val=\"{{ false }}\">\n                  <div style=\"margin-top:10px;color:#1F8A5B;font-weight:700;font-size:13px;\">✓ No corrections needed in this answer.<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"text-align:center;color:#8A97AE;font-size:13.5px;margin-top:16px;\">✓ Your result has been saved — your teacher can now see it.<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fsc-if>\n\n    <div style=\"text-align:center;margin-top:28px;\">\n      <button onclick=\"{{ goHome }}\" style=\"background:transparent;border:1.5px solid #D6DFEF;color:#5A6A85;border-radius:12px;padding:12px 22px;font-size:14px;font-weight:700;cursor:pointer;\" style-hover=\"color:#1D3461;border-color:#1D3461;\">Back to home<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;teacherPasscode&quot;: {&quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;2468&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Access&quot;},\n  &quot;aiModel&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;claude-sonnet-4-5&quot;, &quot;claude-haiku-4-5&quot;], &quot;default&quot;: &quot;claude-sonnet-4-5&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;AI marking&quot;},\n  &quot;showLiveTranscript&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Test screen&quot;}\n}\">\nclass Component extends DCLogic {\n  state = {\n    view: 'landing', pass: '', passErr: false,\n    codeInput: '', codeErr: '',\n    tests: [], results: [],\n    editorOpen: false, editor: null, selCode: null, selResultId: null, exportMsg: '',\n    test: null, name: '', klass: '', num: '', infoErr: '',\n    micReady: false, micErr: '', srOk: true, popupErr: false, openUrl: '',\n    stepIdx: 0, stepLeft: 0, totalLeft: 900, running: false, isRec: false,\n    responses: [], live: '',\n    tab: 2, marking: false, markErr: '', report: null\n  };\n\n  componentDidMount() {\n    const store = this.getStore();\n    let tests = [], results = [];\n    try { tests = JSON.parse(store.getItem('sfs_tests') || '[]'); } catch (e) {}\n    try { results = JSON.parse(store.getItem('sfs_results') || '[]'); } catch (e) {}\n    if (!tests.length) tests = [this.demoTest()];\n    const have = new Set(tests.map(t => t.code));\n    let changed = !store.getItem('sfs_tests');\n    this.presetTests().forEach(p => { if (!have.has(p.code)) { tests.push(p); changed = true; } });\n    if (changed) { try { store.setItem('sfs_tests', JSON.stringify(tests)); } catch (e) {} }\n    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;\n    const extra = {};\n    if (!this.detectPolicyBlocked()) {\n      try {\n        const h = JSON.parse(store.getItem('sfs_handoff') || 'null');\n        if (h && h.ts && Date.now() - h.ts < 5 * 60 * 1000) {\n          store.removeItem('sfs_handoff');\n          const test = tests.find(t => t.code === h.code);\n          if (test) {\n            extra.test = test;\n            extra.name = h.name || ''; extra.klass = h.klass || ''; extra.num = h.num || '';\n            extra.view = (h.name && h.klass && h.num) ? 'micCheck' : 'studentInfo';\n          }\n        }\n      } catch (e) {}\n    }\n    this.setState({ tests, results, srOk: !!SR, ...extra });\n    if (this.detectPolicyBlocked()) this.buildPopupPage();\n    this.msgHandler = (e) => this.onMessage(e);\n    window.addEventListener('message', this.msgHandler);\n    if (window.opener) { try { window.opener.postMessage({ sfsMsg: 'hello' }, '*'); } catch (e) {} }\n  }\n\n  onMessage(e) {\n    const d = e && e.data;\n    if (!d || !d.sfsMsg) return;\n    if (d.sfsMsg === 'hello' && e.source) {\n      let handoff = null;\n      try { handoff = JSON.parse(localStorage.getItem('sfs_handoff') || 'null'); } catch (err) {}\n      try { e.source.postMessage({ sfsMsg: 'init', handoff, tests: this.state.tests, results: this.state.results }, '*'); } catch (err) {}\n      return;\n    }\n    if (d.sfsMsg === 'init') {\n      const extra = {};\n      if (Array.isArray(d.tests) && d.tests.length) extra.tests = d.tests;\n      if (Array.isArray(d.results) && d.results.length) extra.results = this.mergeResults(this.state.results, d.results);\n      const h = d.handoff;\n      const tests = extra.tests || this.state.tests;\n      if (h && h.ts && Date.now() - h.ts < 5 * 60 * 1000 && this.state.view === 'landing') {\n        const test = tests.find(t => t.code === h.code);\n        if (test) {\n          extra.test = test; extra.name = h.name || ''; extra.klass = h.klass || ''; extra.num = h.num || '';\n          extra.view = (h.name && h.klass && h.num) ? 'micCheck' : 'studentInfo';\n        }\n      }\n      this.setState(extra);\n      return;\n    }\n    if (d.sfsMsg === 'saveTests' && Array.isArray(d.tests)) { this.saveTests(d.tests); return; }\n    if (d.sfsMsg === 'saveResults' && Array.isArray(d.results)) { this.saveResults(this.mergeResults(this.state.results, d.results)); return; }\n    if (d.sfsMsg === 'claude' && d.id && e.source && window.claude && window.claude.complete) {\n      const src = e.source;\n      window.claude.complete(d.body).then(\n        (text) => { try { src.postMessage({ sfsMsg: 'claudeResult', id: d.id, ok: true, text }, '*'); } catch (err) {} },\n        (err) => { try { src.postMessage({ sfsMsg: 'claudeResult', id: d.id, ok: false, error: String((err && err.message) || err) }, '*'); } catch (e2) {} }\n      );\n      return;\n    }\n    if (d.sfsMsg === 'claudeResult' && d.id && this.claudeWaiters && this.claudeWaiters[d.id]) {\n      const w = this.claudeWaiters[d.id];\n      delete this.claudeWaiters[d.id];\n      if (d.ok) w.resolve(d.text); else w.reject(new Error(d.error || 'AI relay failed'));\n    }\n  }\n\n  mergeResults(a, b) {\n    const map = {};\n    (a || []).concat(b || []).forEach(r => { if (r && r.id) map[r.id] = r; });\n    return Object.values(map);\n  }\n\n  syncUp(msg) {\n    if (!window.opener) return;\n    try { window.opener.postMessage(msg, '*'); } catch (e) {}\n  }\n\n  async buildPopupPage() {\n    try {\n      const SCR = 'scr' + 'ipt';\n      const [html, sup] = await Promise.all([\n        fetch(window.location.pathname).then(r => { if (!r.ok) throw new Error('page'); return r.text(); }),\n        fetch(new URL('./support.js', window.location.href)).then(r => { if (!r.ok) throw new Error('support'); return r.text(); })\n      ]);\n      const safeSup = sup.split('<\u002F' + SCR).join('<\\\\/' + SCR)\n        .split('<\u002Fx-dc').join('<\\\\u002Fx-dc')\n        .split('<x-dc').join('<x\\\\u002Ddc');\n      const srcTag = new RegExp('<' + SCR + '[^>]*src=[\"\\'][^\"\\']*support\\\\.js[\"\\'][^>]*>\\\\s*<\u002F' + SCR + '>', 'i');\n      const inlineTag = '<' + SCR + '>\\n' + safeSup + '\\n<\u002F' + SCR + '>';\n      const out = html.replace(srcTag, () => inlineTag);\n      const blob = new Blob([out], { type: 'text/html' });\n      this.setState({ openUrl: URL.createObjectURL(blob) });\n    } catch (e) {}\n  }\n\n  saveHandoff() {\n    const S = this.state;\n    try {\n      localStorage.setItem('sfs_handoff', JSON.stringify({\n        ts: Date.now(),\n        code: S.test ? S.test.code : (S.codeInput || '').trim().toUpperCase(),\n        name: S.name, klass: S.klass, num: S.num\n      }));\n    } catch (e) {}\n  }\n\n  getStore() {\n    try {\n      if (window.opener && !window.opener.closed && window.opener.localStorage) {\n        window.opener.localStorage.length; // throws if cross-origin\n        return window.opener.localStorage;\n      }\n    } catch (e) {}\n    return localStorage;\n  }\n\n  detectPolicyBlocked() {\n    try {\n      const fp = document.featurePolicy || document.permissionsPolicy;\n      return window.top !== window.self && !!fp && !fp.allowsFeature('microphone');\n    } catch (e) { return false; }\n  }\n\n  async openWindow() {\n    const S = this.state;\n    try {\n      localStorage.setItem('sfs_handoff', JSON.stringify({\n        ts: Date.now(),\n        code: S.test ? S.test.code : (S.codeInput || '').trim().toUpperCase(),\n        name: S.name, klass: S.klass, num: S.num\n      }));\n    } catch (e) {}\n    // Must open synchronously to keep the user-gesture, then navigate to a blob copy\n    const w = window.open('', '_blank');\n    if (!w) { this.setState({ popupErr: true }); return; }\n    try {\n      w.document.write('<body style=\"font-family:sans-serif;display:grid;place-items:center;min-height:90vh;color:#1D3461\"><div>Preparing your test\\u2026<\u002Fdiv><\u002Fbody>');\n    } catch (e) {}\n    try {\n      const SCR = 'scr' + 'ipt';\n      const [html, sup] = await Promise.all([\n        fetch(window.location.pathname).then(r => { if (!r.ok) throw new Error('page'); return r.text(); }),\n        fetch(new URL('./support.js', window.location.href)).then(r => { if (!r.ok) throw new Error('support'); return r.text(); })\n      ]);\n      const safeSup = sup.split('<\u002F' + SCR).join('<\\\\/' + SCR)\n        .split('<\u002Fx-dc').join('<\\\\u002Fx-dc')\n        .split('<x-dc').join('<x\\\\u002Ddc');\n      const srcTag = new RegExp('<' + SCR + '[^>]*src=[\"\\'][^\"\\']*support\\\\.js[\"\\'][^>]*>\\\\s*<\u002F' + SCR + '>', 'i');\n      const out = html.replace(srcTag, () => '<' + SCR + '>' + safeSup + '<\u002F' + SCR + '>');\n      const blob = new Blob([out], { type: 'text/html' });\n      w.location.href = URL.createObjectURL(blob);\n      this.setState({ popupErr: false });\n    } catch (e) {\n      try { w.close(); } catch (e2) {}\n      this.setState({ popupErr: true });\n    }\n  }\n\n  askClaude(body) {\n    if (window.claude && window.claude.complete) return window.claude.complete(body);\n    try {\n      if (window.opener && window.opener.claude && window.opener.claude.complete) return window.opener.claude.complete(body);\n    } catch (e) {}\n    if (window.opener) {\n      return new Promise((resolve, reject) => {\n        const id = 'c' + Date.now() + '_' + Math.floor(Math.random() * 1e6);\n        this.claudeWaiters = this.claudeWaiters || {};\n        this.claudeWaiters[id] = { resolve, reject };\n        try { window.opener.postMessage({ sfsMsg: 'claude', id, body }, '*'); }\n        catch (e) { delete this.claudeWaiters[id]; reject(e); return; }\n        setTimeout(() => {\n          if (this.claudeWaiters && this.claudeWaiters[id]) {\n            delete this.claudeWaiters[id];\n            reject(new Error('The original tab did not answer. Please keep the first tab open and try again.'));\n          }\n        }, 120000);\n      });\n    }\n    return Promise.reject(new Error('claude-unavailable'));\n  }\n\n  presetTests() {\n    return [\n      {\n        code: 'CELEB1', num: 2, title: 'Celebrations & Festivals (Unit 7 \\u00b7 Test 1)', created: Date.now(),\n        p1: [\n          'What celebrations are popular in your country?',\n          'Do you celebrate any festivals with your family?',\n          'Which is your favourite celebration? Why?',\n          'Do you prefer celebrating with family or with friends?'\n        ],\n        p2topic: 'Describe a celebration in which you were involved.',\n        p2bullets: ['where the celebration took place', 'when it happened', 'why it was held', 'and explain how the celebration was conducted'],\n        p3: [\n          'Why do people celebrate festivals?',\n          'How have celebrations changed in your country in recent years?',\n          'Do you think traditional festivals will disappear in the future?'\n        ]\n      },\n      {\n        code: 'EVENT2', num: 3, title: 'School Cultural Events (Unit 7 \\u00b7 Test 2)', created: Date.now(),\n        p1: [\n          'Did your school organise any special events?',\n          'What kind of activities did you take part in at school?',\n          'Do you think schools should organise more cultural events?',\n          'Did you enjoy performing in front of others at school?'\n        ],\n        p2topic: 'Describe a cultural event that you experienced when you were at school.',\n        p2bullets: ['when it happened', 'what was good about it', 'who was with you at this event', 'and say why this event was so enjoyable'],\n        p3: [\n          'Why is it important for schools to teach about culture and tradition?',\n          'How can cultural events help students develop life skills?',\n          'Do you think technology affects how young people experience culture nowadays?'\n        ]\n      },\n      {\n        code: 'WEDNG3', num: 4, title: 'Weddings & Marriage (Unit 7 \\u00b7 Test 3)', created: Date.now(),\n        p1: [\n          'Have you ever been to a wedding?',\n          'Are weddings in your country usually big or small?',\n          'Do you prefer traditional or modern weddings?',\n          'What do people usually wear to a wedding in your country?'\n        ],\n        p2topic: 'Describe a wedding you have been to or heard about.',\n        p2bullets: ['whose wedding it was', 'what the ceremony was like', 'what clothes people wore', 'and explain how you felt about the wedding'],\n        p3: [\n          'How have weddings changed in your country over the past few decades?',\n          'Why do you think wedding customs differ between countries?',\n          'What are the advantages and disadvantages of having a big wedding?'\n        ]\n      },\n      {\n        code: 'MARKT4', num: 5, title: 'Marketing & Advertising', created: Date.now(),\n        p1: [\n          'Do you mind watching advertisements? Why or why not?',\n          'Have you ever bought something because of an advertisement?',\n          'What kind of advertisements do you dislike?',\n          'Do you think there are too many advertisements on the internet nowadays?'\n        ],\n        p2topic: 'Describe an advertisement (on TV or the internet) that you found interesting or memorable.',\n        p2bullets: ['what product or service it was for', 'where you saw it', 'what happened in the advertisement', 'and explain why you found it interesting or memorable'],\n        p3: [\n          'How do advertisements influence consumer behaviour, especially in young children?',\n          'Do you think regulations on advertising should be stricter?',\n          'In what ways has digital marketing changed the way businesses communicate with their customers compared to traditional marketing?'\n        ]\n      },\n      {\n        code: 'CITYS5', num: 6, title: 'City & Urban Life', created: Date.now(),\n        p1: [\n          'Do you like the city you are living in now? Why or why not?',\n          'Do you prefer living in a city or the countryside?',\n          'What is the public transportation system like in your city?',\n          'What kind of cities do you like to visit as a tourist?'\n        ],\n        p2topic: 'Describe a beautiful or famous city that you think is interesting.',\n        p2bullets: ['where it is', 'what it is famous for', 'what you can do there', 'and explain why you find it interesting'],\n        p3: [\n          'Why do young people tend to migrate to bigger cities?',\n          'What are the main disadvantages of rapid urban growth?',\n          'Should governments prioritize creating green spaces or building new housing?'\n        ]\n      },\n      {\n        code: 'CULTR6', num: 7, title: 'Culture & Social Change \\u2014 Review', created: Date.now(),\n        p1: [\n          'Has the way people celebrate changed over the years?',\n          'What subjects or activities were you best at in school?',\n          'Do you enjoy attending weddings?',\n          'Do you prefer celebrating with family or with friends?'\n        ],\n        p2topic: 'Describe a traditional custom in your country that you think should be preserved.',\n        p2bullets: ['what the custom is', 'when and how people practise it', 'how you learned about it', 'and explain why you think it should be preserved'],\n        p3: [\n          'What is the role of celebrations in maintaining cultural identity?',\n          'Should cultural education be compulsory in schools?',\n          'How does society view marriage differently now compared to the past?'\n        ]\n      }\n    ];\n  }\n\n  componentWillUnmount() {\n    if (this.timer) clearInterval(this.timer);\n    if (this.msgHandler) window.removeEventListener('message', this.msgHandler);\n    this.killMedia();\n  }\n\n  demoTest() {\n    return {\n      code: 'DEMO01', num: 1, title: 'Practice Test 1',\n      p1: [\n        'Let\\u2019s talk about your hometown. What do you like most about the place where you grew up?',\n        'Do you prefer spending your free time indoors or outdoors? Why?',\n        'How often do you use English outside of class?',\n        'What kind of music do you enjoy listening to?'\n      ],\n      p2topic: 'Describe a person who has inspired you.',\n      p2bullets: ['who this person is', 'how you know them', 'what they have done', 'and explain why this person inspires you'],\n      p3: [\n        'What qualities do you think make someone a good role model?',\n        'Do you think famous people have a responsibility to behave well in public? Why?',\n        'How has the way young people choose their role models changed in recent years?'\n      ],\n      created: Date.now()\n    };\n  }\n\n  saveTests(tests) { try { this.getStore().setItem('sfs_tests', JSON.stringify(tests)); } catch (e) {} this.setState({ tests }); this.syncUp({ sfsMsg: 'saveTests', tests }); }\n  saveResults(results) { try { this.getStore().setItem('sfs_results', JSON.stringify(results)); } catch (e) {} this.setState({ results }); this.syncUp({ sfsMsg: 'saveResults', results }); }\n\n  fmt(s) { s = Math.max(0, s); const m = Math.floor(s / 60), ss = s % 60; return m + ':' + (ss < 10 ? '0' : '') + ss; }\n  makeCode() {\n    const chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789'; let c = '';\n    for (let i = 0; i < 6; i++) c += chars[Math.floor(Math.random() * chars.length)];\n    return this.state.tests.some(t => t.code === c) ? this.makeCode() : c;\n  }\n\n  // ---------- test run ----------\n  buildSteps(test) {\n    const steps = [];\n    test.p1.forEach((q, i) => steps.push({ part: 1, type: 'q', q, seconds: 40, record: true, label: 'PART 1 \\u00b7 QUESTION ' + (i + 1) + ' OF ' + test.p1.length }));\n    steps.push({ part: 2, type: 'prep', seconds: 60, record: false, label: 'PART 2 \\u00b7 PREPARATION' });\n    steps.push({ part: 2, type: 'p2', seconds: 120, record: true, label: 'PART 2 \\u00b7 YOUR TALK' });\n    test.p3.forEach((q, i) => steps.push({ part: 3, type: 'q', q, seconds: 60, record: true, label: 'PART 3 \\u00b7 QUESTION ' + (i + 1) + ' OF ' + test.p3.length }));\n    return steps;\n  }\n\n  startTest() {\n    this.steps = this.buildSteps(this.state.test);\n    this.responses = [];\n    this.setState({\n      view: 'test', stepIdx: 0, stepLeft: this.steps[0].seconds, totalLeft: 900,\n      running: true, responses: [], live: '', report: null, markErr: '', tab: 2\n    }, () => this.startRec());\n    this.timer = setInterval(() => this.tick(), 1000);\n  }\n\n  tick() {\n    if (!this.state.running) return;\n    const total = this.state.totalLeft - 1, left = this.state.stepLeft - 1;\n    this.setState({ totalLeft: total, stepLeft: left });\n    if (total <= 0) { this.finish(false); return; }\n    if (left <= 0) this.advance();\n  }\n\n  startRec() {\n    const step = this.steps[this.state.stepIdx];\n    if (!step || !step.record || !this.stream) return;\n    this.chunks = []; this.finalTx = '';\n    try {\n      this.rec = new MediaRecorder(this.stream);\n      this.rec.ondataavailable = e => { if (e.data && e.data.size) this.chunks.push(e.data); };\n      this.rec.start();\n      this.setState({ isRec: true });\n    } catch (e) { this.rec = null; this.setState({ isRec: true }); }\n    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;\n    if (SR) {\n      try {\n        const r = new SR();\n        r.lang = 'en-US'; r.continuous = true; r.interimResults = true;\n        r.onresult = (ev) => {\n          let interim = '';\n          for (let i = ev.resultIndex; i < ev.results.length; i++) {\n            const res = ev.results[i];\n            if (res.isFinal) this.finalTx += res[0].transcript + ' ';\n            else interim += res[0].transcript;\n          }\n          const full = (this.finalTx + interim).trim();\n          this.setState({ live: full.length > 150 ? full.slice(-150) : full });\n        };\n        r.onend = () => { if (this.srActive) { try { r.start(); } catch (e) {} } };\n        r.onerror = () => {};\n        this.srActive = true;\n        r.start();\n        this.sr = r;\n      } catch (e) { this.sr = null; }\n    }\n  }\n\n  stopRec(step, used) {\n    return new Promise(resolve => {\n      this.srActive = false;\n      if (this.sr) { try { this.sr.stop(); } catch (e) {} this.sr = null; }\n      const finalize = (blob) => {\n        this.responses.push({\n          part: step.part,\n          label: step.label,\n          question: step.type === 'p2' ? this.state.test.p2topic : (step.q || ''),\n          dur: used,\n          transcript: (this.finalTx || '').trim(),\n          audioUrl: blob ? URL.createObjectURL(blob) : ''\n        });\n        this.setState({ responses: [...this.responses], isRec: false, live: '' });\n        resolve();\n      };\n      if (this.rec && this.rec.state !== 'inactive') {\n        const rec = this.rec;\n        let done = false;\n        rec.onstop = () => { if (done) return; done = true; finalize(this.chunks.length ? new Blob(this.chunks, { type: rec.mimeType || 'audio/webm' }) : null); };\n        setTimeout(() => { if (!done) { done = true; finalize(this.chunks.length ? new Blob(this.chunks, { type: 'audio/webm' }) : null); } }, 1500);\n        try { rec.stop(); } catch (e) { if (!done) { done = true; finalize(null); } }\n      } else finalize(null);\n      this.rec = null;\n    });\n  }\n\n  async advance() {\n    if (this.adv) return;\n    this.adv = true;\n    const step = this.steps[this.state.stepIdx];\n    const used = step.seconds - Math.max(0, this.state.stepLeft);\n    if (step.record) await this.stopRec(step, used);\n    const ni = this.state.stepIdx + 1;\n    if (ni >= this.steps.length) { this.adv = false; this.finish(true); return; }\n    this.setState({ stepIdx: ni, stepLeft: this.steps[ni].seconds }, () => this.startRec());\n    this.adv = false;\n  }\n\n  async finish(alreadyStopped) {\n    if (this.finished) return;\n    this.finished = true;\n    if (this.timer) { clearInterval(this.timer); this.timer = null; }\n    if (!alreadyStopped) {\n      const step = this.steps[this.state.stepIdx];\n      if (step && step.record) {\n        const used = step.seconds - Math.max(0, this.state.stepLeft);\n        await this.stopRec(step, used);\n      }\n    }\n    this.killMedia();\n    this.finished = false;\n    this.setState({ running: false, view: 'results', tab: 2, marking: true, markErr: '' });\n    this.runMarking();\n  }\n\n  killMedia() {\n    this.srActive = false;\n    if (this.sr) { try { this.sr.stop(); } catch (e) {} this.sr = null; }\n    if (this.rec && this.rec.state !== 'inactive') { try { this.rec.stop(); } catch (e) {} }\n    this.rec = null;\n    if (this.stream) { this.stream.getTracks().forEach(t => t.stop()); this.stream = null; }\n  }\n\n  feedbackPalette() {\n    return {\n      grammar: { bg: '#DBEAFE', bd: '#60A5FA', fg: '#1D4ED8', label: 'Grammar' },\n      vocabulary: { bg: '#FEF3C7', bd: '#F59E0B', fg: '#92400E', label: 'Vocabulary' },\n      pronunciation: { bg: '#FFEDD5', bd: '#FB923C', fg: '#9A3412', label: 'Pronunciation' },\n      coherence: { bg: '#EDE9FE', bd: '#A78BFA', fg: '#6D28D9', label: 'Coherence' },\n      fluency: { bg: '#CFFAFE', bd: '#06B6D4', fg: '#0E7490', label: 'Fluency' }\n    };\n  }\n\n  annotate(corrections) {\n    const PAL = this.feedbackPalette();\n    return this.responses.map((r, ri) => {\n      const text = r.transcript || '';\n      const mine = (corrections || []).filter(c => (parseInt(c.answer) || 0) === ri + 1 && c.quote && PAL[String(c.type).toLowerCase()]);\n      const hits = [];\n      mine.forEach(c => {\n        const q = String(c.quote).trim();\n        if (!q) return;\n        const i = text.toLowerCase().indexOf(q.toLowerCase());\n        if (i >= 0) hits.push({ start: i, end: i + q.length, c });\n      });\n      hits.sort((a, b) => a.start - b.start);\n      const segments = [], notes = [];\n      let pos = 0;\n      hits.forEach(h => {\n        if (h.start < pos) return;\n        const p = PAL[String(h.c.type).toLowerCase()];\n        if (h.start > pos) segments.push({ text: text.slice(pos, h.start), bg: 'transparent', bd: 'transparent', fg: 'inherit', sup: '' });\n        const num = notes.length + 1;\n        segments.push({ text: text.slice(h.start, h.end), bg: p.bg, bd: p.bd, fg: p.fg, sup: String(num) });\n        notes.push({ num: String(num), typeLabel: p.label, chipBg: p.bg, chipFg: p.fg, quote: text.slice(h.start, h.end), fix: String(h.c.fix || ''), note: String(h.c.note || '') });\n        pos = h.end;\n      });\n      if (pos < text.length || !segments.length) segments.push({ text: text.slice(pos) || '(no speech detected)', bg: 'transparent', bd: 'transparent', fg: 'inherit', sup: '' });\n      return {\n        label: r.label, question: r.question, durText: r.dur + 's spoken',\n        segments, notes,\n        hasNotes: notes.length > 0,\n        noNotes: notes.length === 0 && !!text.trim()\n      };\n    });\n  }\n\n  // ---------- AI marking ----------\n  async runMarking() {\n    const words = this.responses.map(r => r.transcript).join(' ').split(/\\s+/).filter(Boolean).length;\n    if (words < 10) {\n      this.setState({ marking: false, markErr: 'We could not capture enough of your speech to mark the test. Your recordings are saved in tab 1. For AI marking, please use Google Chrome on a computer or Android phone, check your microphone, and speak clearly.' });\n      return;\n    }\n    const lines = this.responses.map((r, i) =>\n      '--- Answer ' + (i + 1) + ' \\u00b7 ' + r.label + ' (spoke for ' + r.dur + 's of ' + (r.part === 2 ? '120' : r.part === 1 ? '40' : '60') + 's) ---\\nQuestion: ' + r.question + '\\nStudent\\u2019s answer (speech-to-text transcript): ' + (r.transcript || '(no speech detected)')\n    ).join('\\n\\n');\n    const sys = 'You are a certified IELTS Speaking examiner who also gives interactive corrective feedback. You mark strictly but fairly against the official IELTS Speaking band descriptors (Fluency and Coherence, Lexical Resource, Grammatical Range and Accuracy, Pronunciation). You are given speech-to-text transcripts, so judge Pronunciation approximately from transcription clarity, word choice and flow, and note it is an estimate. Bands are 0-9 in 0.5 steps. For corrections you quote short snippets copied VERBATIM from the transcript. Respon
